apiVersion: network.openshift.io/v1
kind: EgressNetworkPolicy
metadata:
  name: egress-snowflake
  namespace: my-project
spec:
  egress:
    - type: Allow
      to:
        dnsName: "*.snowflakecomputing.com"   # wildcard for all account subdomains
    - type: Deny
      to:
        cidrSelector: 0.0.0.0/0               # deny everything else
